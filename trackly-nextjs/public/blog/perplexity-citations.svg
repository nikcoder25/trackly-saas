<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0c2a33"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1a96a5"/>
      <stop offset="100%" stop-color="#20b8cd"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#20b8cd" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#20b8cd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="340" rx="400" ry="260" fill="url(#glow)"/>

  <!-- Ranked citation list panel -->
  <rect x="300" y="150" width="600" height="360" rx="16" fill="#0e1f26" stroke="#20b8cd" stroke-width="1" opacity="0.65"/>
  <text x="330" y="192" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#67e8f9" letter-spacing="1">CITATION SHARE OF VOICE</text>

  <!-- Rows -->
  <g font-family="system-ui, sans-serif">
    <!-- Row 1 -->
    <circle cx="342" cy="238" r="14" fill="url(#teal)"/>
    <text x="342" y="243" text-anchor="middle" font-size="13" font-weight="700" fill="#04222a">1</text>
    <text x="372" y="243" font-size="15" font-weight="600" fill="#e2e8f0">yourbrand.com</text>
    <rect x="560" y="230" width="300" height="16" rx="8" fill="#1f2937"/>
    <rect x="560" y="230" width="240" height="16" rx="8" fill="url(#teal)"/>
    <text x="874" y="243" text-anchor="end" font-size="13" fill="#67e8f9">41%</text>

    <!-- Row 2 -->
    <circle cx="342" cy="288" r="14" fill="#334155"/>
    <text x="342" y="293" text-anchor="middle" font-size="13" font-weight="700" fill="#cbd5e1">2</text>
    <text x="372" y="293" font-size="15" font-weight="600" fill="#cbd5e1">competitor-a.com</text>
    <rect x="560" y="280" width="300" height="16" rx="8" fill="#1f2937"/>
    <rect x="560" y="280" width="170" height="16" rx="8" fill="#6366f1" opacity="0.8"/>
    <text x="874" y="293" text-anchor="end" font-size="13" fill="#a5b4fc">28%</text>

    <!-- Row 3 -->
    <circle cx="342" cy="338" r="14" fill="#334155"/>
    <text x="342" y="343" text-anchor="middle" font-size="13" font-weight="700" fill="#cbd5e1">3</text>
    <text x="372" y="343" font-size="15" font-weight="600" fill="#cbd5e1">g2.com</text>
    <rect x="560" y="330" width="300" height="16" rx="8" fill="#1f2937"/>
    <rect x="560" y="330" width="110" height="16" rx="8" fill="#6366f1" opacity="0.6"/>
    <text x="874" y="343" text-anchor="end" font-size="13" fill="#a5b4fc">18%</text>

    <!-- Row 4 -->
    <circle cx="342" cy="388" r="14" fill="#334155"/>
    <text x="342" y="393" text-anchor="middle" font-size="13" font-weight="700" fill="#cbd5e1">4</text>
    <text x="372" y="393" font-size="15" font-weight="600" fill="#94a3b8">reddit.com</text>
    <rect x="560" y="380" width="300" height="16" rx="8" fill="#1f2937"/>
    <rect x="560" y="380" width="80" height="16" rx="8" fill="#475569"/>
    <text x="874" y="393" text-anchor="end" font-size="13" fill="#94a3b8">13%</text>
  </g>

  <!-- Trend footer -->
  <text x="330" y="452" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Citation rank tracked on every scheduled run</text>
  <polyline points="330,486 400,478 470,482 540,466 610,470 680,452 750,458 820,440" fill="none" stroke="#20b8cd" stroke-width="2.5" opacity="0.8"/>
  <circle cx="820" cy="440" r="4" fill="#20b8cd"/>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="0.5">
    Mentions and Citations in Perplexity
  </text>
  <text x="600" y="592" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">
    KNOW EXACTLY WHICH SOURCES PERPLEXITY TRUSTS
  </text>
</svg>
