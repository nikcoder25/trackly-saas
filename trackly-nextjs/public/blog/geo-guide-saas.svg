<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1a1640"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.18"/><stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="340" rx="420" ry="260" fill="url(#glow)"/>

  <!-- Hub and spoke -->
  <g stroke="#6366f1" stroke-width="2" opacity="0.4" fill="none">
    <line x1="600" y1="340" x2="360" y2="230"/><line x1="600" y1="340" x2="360" y2="450"/>
    <line x1="600" y1="340" x2="840" y2="230"/><line x1="600" y1="340" x2="840" y2="450"/>
    <line x1="600" y1="340" x2="600" y2="200"/><line x1="600" y1="340" x2="600" y2="480"/>
  </g>
  <!-- Center hub -->
  <circle cx="600" cy="340" r="60" fill="url(#acc)" opacity="0.95"/>
  <text x="600" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#ffffff">GEO</text>
  <text x="600" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e0e7ff">pillar</text>

  <!-- Spokes -->
  <g font-family="system-ui, sans-serif" font-size="12" font-weight="600">
    <circle cx="360" cy="230" r="34" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/><text x="360" y="234" text-anchor="middle" fill="#a5b4fc">Content</text>
    <circle cx="360" cy="450" r="34" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/><text x="360" y="454" text-anchor="middle" fill="#a5b4fc">Schema</text>
    <circle cx="840" cy="230" r="34" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/><text x="840" y="234" text-anchor="middle" fill="#d8b4fe">Citations</text>
    <circle cx="840" cy="450" r="34" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/><text x="840" y="454" text-anchor="middle" fill="#d8b4fe">Authority</text>
    <circle cx="600" cy="200" r="30" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/><text x="600" y="204" text-anchor="middle" fill="#a5b4fc">Measure</text>
    <circle cx="600" cy="480" r="30" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/><text x="600" y="484" text-anchor="middle" fill="#d8b4fe">Freshness</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white">Generative Engine Optimization</text>
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">THE COMPLETE GEO GUIDE FOR SAAS</text>
</svg>
