<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-left" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bg-right" x1="50%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c2a3d"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="left-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="right-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="630" fill="url(#bg-left)"/>
  <rect x="600" width="600" height="630" fill="url(#bg-right)"/>

  <!-- Ambient glows -->
  <ellipse cx="300" cy="340" rx="250" ry="200" fill="url(#left-glow)"/>
  <ellipse cx="900" cy="340" rx="250" ry="200" fill="url(#right-glow)"/>

  <!-- Left side: SEO / Magnifying glass -->
  <g transform="translate(300, 320)">
    <!-- Magnifying glass -->
    <circle cx="0" cy="-20" r="70" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="-20" r="60" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="48" y1="32" x2="85" y2="70" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

    <!-- Search result lines inside glass -->
    <rect x="-35" y="-45" width="50" height="4" rx="2" fill="#6366f1" opacity="0.4"/>
    <rect x="-35" y="-33" width="40" height="4" rx="2" fill="#6366f1" opacity="0.3"/>
    <rect x="-35" y="-21" width="45" height="4" rx="2" fill="#6366f1" opacity="0.25"/>
    <rect x="-35" y="-9" width="30" height="4" rx="2" fill="#6366f1" opacity="0.2"/>

    <!-- Decorative dots around -->
    <circle cx="-90" cy="-60" r="3" fill="#6366f1" opacity="0.3"/>
    <circle cx="80" cy="-70" r="2" fill="#6366f1" opacity="0.25"/>
    <circle cx="-70" cy="50" r="2.5" fill="#6366f1" opacity="0.2"/>
  </g>
  <text x="300" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#6366f1" opacity="0.8">
    Traditional SEO
  </text>
  <text x="300" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" opacity="0.7">
    Keywords / Rankings / Links
  </text>

  <!-- Center divider -->
  <line x1="600" y1="60" x2="600" y2="570" stroke="url(#divider-grad)" stroke-width="2"/>

  <!-- VS circle -->
  <circle cx="600" cy="315" r="36" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
  <circle cx="600" cy="315" r="36" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <text x="600" y="324" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white">
    VS
  </text>

  <!-- Right side: AI / Brain-chip -->
  <g transform="translate(900, 310)">
    <!-- Hexagonal chip shape -->
    <polygon points="0,-75 65,-37.5 65,37.5 0,75 -65,37.5 -65,-37.5" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.7"/>
    <polygon points="0,-55 47,-27.5 47,27.5 0,55 -47,27.5 -47,-27.5" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>

    <!-- Circuit lines emanating -->
    <line x1="65" y1="0" x2="100" y2="0" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="100" y1="0" x2="100" y2="-30" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="-65" y1="0" x2="-100" y2="0" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="-100" y1="0" x2="-100" y2="30" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="-56" x2="50" y2="-85" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
    <line x1="-32" y1="56" x2="-50" y2="85" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>

    <!-- Inner neural dots -->
    <circle cx="0" cy="0" r="8" fill="#06b6d4" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.5"/>
    <circle cx="-25" cy="-15" r="4" fill="#06b6d4" opacity="0.4"/>
    <circle cx="25" cy="-15" r="4" fill="#06b6d4" opacity="0.4"/>
    <circle cx="-25" cy="15" r="4" fill="#06b6d4" opacity="0.4"/>
    <circle cx="25" cy="15" r="4" fill="#06b6d4" opacity="0.4"/>

    <!-- Inner connections -->
    <line x1="0" y1="0" x2="-25" y2="-15" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="25" y2="-15" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-25" y2="15" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="25" y2="15" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>

    <!-- Endpoint dots -->
    <circle cx="100" cy="-30" r="3" fill="#06b6d4" opacity="0.5"/>
    <circle cx="-100" cy="30" r="3" fill="#06b6d4" opacity="0.5"/>
    <circle cx="50" cy="-85" r="2.5" fill="#06b6d4" opacity="0.4"/>
    <circle cx="-50" cy="85" r="2.5" fill="#06b6d4" opacity="0.4"/>
  </g>
  <text x="900" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#06b6d4" opacity="0.8">
    AI Visibility
  </text>
  <text x="900" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" opacity="0.7">
    Context / Citations / Authority
  </text>

  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="1">
    AI Visibility vs Traditional SEO
  </text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" letter-spacing="2">
    THE NEW FRONTIER OF BRAND DISCOVERY
  </text>
</svg>