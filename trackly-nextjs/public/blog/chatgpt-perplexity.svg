<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#141233"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8168"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#20b8cd"/>
      <stop offset="100%" stop-color="#1a96a5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="350" rx="420" ry="260" fill="url(#glow)"/>

  <!-- ChatGPT card (left) -->
  <rect x="220" y="200" width="330" height="260" rx="16" fill="#0d1f1a" stroke="#10a37f" stroke-width="1.5" opacity="0.85"/>
  <circle cx="270" cy="248" r="22" fill="url(#green)"/>
  <text x="270" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#04140f">C</text>
  <text x="306" y="253" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6ee7b7">ChatGPT</text>
  <rect x="252" y="296" width="250" height="11" rx="5" fill="#334155" opacity="0.8"/>
  <rect x="252" y="320" width="220" height="11" rx="5" fill="#334155" opacity="0.6"/>
  <rect x="252" y="352" width="120" height="24" rx="7" fill="url(#green)" opacity="0.9"/>
  <text x="312" y="369" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#04140f">Your Brand</text>
  <rect x="252" y="398" width="250" height="11" rx="5" fill="#334155" opacity="0.5"/>
  <rect x="252" y="422" width="180" height="11" rx="5" fill="#334155" opacity="0.4"/>

  <!-- Perplexity card (right) -->
  <rect x="650" y="200" width="330" height="260" rx="16" fill="#0e1f26" stroke="#20b8cd" stroke-width="1.5" opacity="0.85"/>
  <circle cx="700" cy="248" r="22" fill="url(#teal)"/>
  <text x="700" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#04222a">P</text>
  <text x="736" y="253" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#67e8f9">Perplexity</text>
  <rect x="682" y="296" width="250" height="11" rx="5" fill="#334155" opacity="0.8"/>
  <rect x="682" y="320" width="220" height="11" rx="5" fill="#334155" opacity="0.6"/>
  <rect x="682" y="352" width="120" height="24" rx="7" fill="url(#teal)" opacity="0.9"/>
  <text x="742" y="369" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#04222a">Your Brand</text>
  <!-- citation chips -->
  <rect x="682" y="398" width="70" height="22" rx="6" fill="#123039" stroke="#20b8cd" stroke-width="1"/>
  <text x="717" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#67e8f9">cite 1</text>
  <rect x="762" y="398" width="70" height="22" rx="6" fill="#123039" stroke="#20b8cd" stroke-width="1" opacity="0.7"/>
  <text x="797" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#67e8f9">cite 2</text>

  <!-- Unifying hub between them -->
  <circle cx="600" cy="330" r="34" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#a5b4fc">1 view</text>
  <line x1="550" y1="330" x2="566" y2="330" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <line x1="634" y1="330" x2="650" y2="330" stroke="#20b8cd" stroke-width="2" opacity="0.6"/>

  <text x="600" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="0.5">
    Track Mentions in ChatGPT and Perplexity
  </text>
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">
    ONE DASHBOARD FOR BOTH AI PLATFORMS
  </text>
</svg>
