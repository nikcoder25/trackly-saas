<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="hub-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="sm-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="600" cy="280" r="220" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#6366f1" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Connection lines from hub to platforms -->
  <g stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5">
    <!-- To platform 1 - top left -->
    <line x1="600" y1="270" x2="350" y2="160"/>
    <!-- To platform 2 - top right -->
    <line x1="600" y1="270" x2="850" y2="160"/>
    <!-- To platform 3 - left -->
    <line x1="600" y1="270" x2="280" y2="340"/>
    <!-- To platform 4 - right -->
    <line x1="600" y1="270" x2="920" y2="340"/>
    <!-- To platform 5 - bottom -->
    <line x1="600" y1="270" x2="600" y2="440"/>
  </g>

  <!-- Dashed orbit ring -->
  <ellipse cx="600" cy="280" rx="320" ry="180" fill="none" stroke="#6366f1" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="6 6"/>

  <!-- Platform node glows -->
  <circle cx="350" cy="160" r="30" fill="#6366f1" opacity="0.08" filter="url(#sm-glow)"/>
  <circle cx="850" cy="160" r="30" fill="#06b6d4" opacity="0.08" filter="url(#sm-glow)"/>
  <circle cx="280" cy="340" r="30" fill="#6366f1" opacity="0.08" filter="url(#sm-glow)"/>
  <circle cx="920" cy="340" r="30" fill="#06b6d4" opacity="0.08" filter="url(#sm-glow)"/>
  <circle cx="600" cy="440" r="30" fill="#6366f1" opacity="0.08" filter="url(#sm-glow)"/>

  <!-- Platform circles -->
  <!-- Platform 1 -->
  <circle cx="350" cy="160" r="22" fill="#1e293b" stroke="#6366f1" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="350" cy="160" r="8" fill="#6366f1" opacity="0.7"/>
  <text x="350" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">ChatGPT</text>

  <!-- Platform 2 -->
  <circle cx="850" cy="160" r="22" fill="#1e293b" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="850" cy="160" r="8" fill="#06b6d4" opacity="0.7"/>
  <text x="850" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Gemini</text>

  <!-- Platform 3 -->
  <circle cx="280" cy="340" r="22" fill="#1e293b" stroke="#6366f1" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="280" cy="340" r="8" fill="#6366f1" opacity="0.7"/>
  <text x="280" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Claude</text>

  <!-- Platform 4 -->
  <circle cx="920" cy="340" r="22" fill="#1e293b" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="920" cy="340" r="8" fill="#06b6d4" opacity="0.7"/>
  <text x="920" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Perplexity</text>

  <!-- Platform 5 -->
  <circle cx="600" cy="440" r="22" fill="#1e293b" stroke="#6366f1" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="600" cy="440" r="8" fill="#6366f1" opacity="0.7"/>
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Copilot</text>

  <!-- Central hub -->
  <circle cx="600" cy="270" r="45" fill="#6366f1" opacity="0.1" filter="url(#sm-glow)"/>
  <circle cx="600" cy="270" r="35" fill="#1e293b" stroke="#6366f1" stroke-width="2.5"/>
  <circle cx="600" cy="270" r="28" fill="url(#hub-grad)" opacity="0.15"/>

  <!-- Dashboard icon inside hub -->
  <rect x="582" y="255" width="14" height="10" rx="2" fill="#a5b4fc" opacity="0.8"/>
  <rect x="582" y="268" width="14" height="14" rx="2" fill="#6366f1" opacity="0.8"/>
  <rect x="600" y="255" width="18" height="14" rx="2" fill="#6366f1" opacity="0.8"/>
  <rect x="600" y="272" width="18" height="10" rx="2" fill="#a5b4fc" opacity="0.8"/>

  <!-- Outer ring pulses -->
  <circle cx="600" cy="270" r="50" fill="none" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="600" cy="270" r="65" fill="none" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Data flow dots on connections -->
  <circle cx="475" cy="215" r="3" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="725" cy="215" r="3" fill="#67e8f9" opacity="0.5"/>
  <circle cx="440" cy="305" r="3" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="760" cy="305" r="3" fill="#67e8f9" opacity="0.5"/>
  <circle cx="600" cy="355" r="3" fill="#a5b4fc" opacity="0.5"/>

  <!-- Title text -->
  <text x="600" y="555" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="0.5">Track Your Brand Across AI Platforms</text>
  <text x="600" y="583" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="1">UNIFIED AI VISIBILITY MONITORING</text>
</svg>