<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1a1640"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="hub-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="340" rx="350" ry="250" fill="url(#center-glow)"/>

  <!-- Dashboard frame -->
  <rect x="200" y="140" width="800" height="400" rx="12" fill="#0f172a" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <rect x="200" y="140" width="800" height="35" rx="12" fill="#1e1b4b" opacity="0.6"/>
  <!-- Window dots -->
  <circle cx="224" cy="157" r="5" fill="#6366f1" opacity="0.5"/>
  <circle cx="240" cy="157" r="5" fill="#06b6d4" opacity="0.4"/>
  <circle cx="256" cy="157" r="5" fill="#94a3b8" opacity="0.3"/>

  <!-- Central hub -->
  <circle cx="600" cy="340" r="50" fill="url(#hub-grad)" opacity="0.9"/>
  <circle cx="600" cy="340" r="38" fill="#0f172a" opacity="0.6"/>
  <circle cx="600" cy="340" r="20" fill="#6366f1" opacity="0.7"/>
  <circle cx="600" cy="340" r="10" fill="white" opacity="0.6"/>

  <!-- Orbiting rings -->
  <circle cx="600" cy="340" r="80" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,6"/>
  <circle cx="600" cy="340" r="130" fill="none" stroke="#06b6d4" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,8"/>

  <!-- Connection lines to platforms -->
  <g stroke-width="2" fill="none" filter="url(#soft)">
    <line x1="600" y1="340" x2="360" y2="240" stroke="#6366f1" opacity="0.5"/>
    <line x1="600" y1="340" x2="840" y2="240" stroke="#6366f1" opacity="0.5"/>
    <line x1="600" y1="340" x2="310" y2="420" stroke="#06b6d4" opacity="0.45"/>
    <line x1="600" y1="340" x2="890" y2="420" stroke="#06b6d4" opacity="0.45"/>
    <line x1="600" y1="340" x2="600" y2="480" stroke="#6366f1" opacity="0.4"/>
  </g>

  <!-- Platform 1: top-left -->
  <circle cx="360" cy="240" r="28" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" opacity="0.8"/>
  <text x="360" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#a5b4fc" opacity="0.8">ChatGPT</text>

  <!-- Platform 2: top-right -->
  <circle cx="840" cy="240" r="28" fill="#0c2a3d" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  <text x="840" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#67e8f9" opacity="0.8">Gemini</text>

  <!-- Platform 3: bottom-left -->
  <circle cx="310" cy="420" r="25" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" opacity="0.75"/>
  <text x="310" y="424" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#a5b4fc" opacity="0.7">Claude</text>

  <!-- Platform 4: bottom-right -->
  <circle cx="890" cy="420" r="25" fill="#0c2a3d" stroke="#06b6d4" stroke-width="1.5" opacity="0.75"/>
  <text x="890" y="424" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#67e8f9" opacity="0.7">Perplexity</text>

  <!-- Platform 5: bottom-center -->
  <circle cx="600" cy="480" r="26" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#a5b4fc" opacity="0.7">Copilot</text>

  <!-- Pulse dots on connections -->
  <circle cx="480" cy="290" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="720" cy="290" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="455" cy="380" r="2.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="745" cy="380" r="2.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="600" cy="420" r="2.5" fill="#6366f1" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="1">
    Track Your Brand Across AI
  </text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" letter-spacing="2">
    MONITOR 5 MAJOR AI PLATFORMS IN REAL TIME
  </text>
</svg>