<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="cs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c2a2a"/>
    </linearGradient>
    <radialGradient id="cs-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#19c37d" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#19c37d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#cs-bg)"/>
  <ellipse cx="600" cy="330" rx="420" ry="260" fill="url(#cs-glow)"/>

  <!-- Balance scale: SEO vs AI -->
  <g transform="translate(600,300)" stroke-linecap="round">
    <!-- fulcrum -->
    <line x1="0" y1="-70" x2="0" y2="60" stroke="#94a3b8" stroke-width="4" opacity="0.6"/>
    <polygon points="-30,60 30,60 20,90 -20,90" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5" opacity="0.7"/>
    <!-- beam -->
    <line x1="-200" y1="-58" x2="200" y2="-58" stroke="#cbd5e1" stroke-width="4" opacity="0.8"/>
    <circle cx="0" cy="-70" r="8" fill="#cbd5e1" opacity="0.8"/>

    <!-- left pan: SEO -->
    <line x1="-200" y1="-58" x2="-200" y2="0" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <path d="M -250 0 A 50 26 0 0 0 -150 0 Z" fill="#111a33" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
    <text x="-200" y="-14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#6366f1">SEO</text>

    <!-- right pan: AI -->
    <line x1="200" y1="-58" x2="200" y2="0" stroke="#19c37d" stroke-width="1.5" opacity="0.5"/>
    <path d="M 150 0 A 50 26 0 0 0 250 0 Z" fill="#0c2a22" stroke="#19c37d" stroke-width="2" opacity="0.9"/>
    <text x="200" y="-14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#19c37d">AI</text>
  </g>

  <text x="600" y="76" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="1">
    Is ChatGPT Bad for SEO?
  </text>
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#cbd5e1" opacity="0.9">
    It doesn't kill SEO - it splits it in two.
  </text>
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">
    RANK PAGES + WIN AI ANSWERS
  </text>
</svg>
