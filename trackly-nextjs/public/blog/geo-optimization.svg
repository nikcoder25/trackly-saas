<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#6366f1" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="350" rx="400" ry="250" fill="url(#glow1)"/>
  <ellipse cx="750" cy="280" rx="300" ry="200" fill="url(#glow2)"/>

  <!-- Network connections -->
  <g stroke="url(#line-grad)" stroke-width="1.5" fill="none" filter="url(#blur1)">
    <line x1="600" y1="300" x2="350" y2="200"/>
    <line x1="600" y1="300" x2="850" y2="180"/>
    <line x1="600" y1="300" x2="300" y2="420"/>
    <line x1="600" y1="300" x2="900" y2="400"/>
    <line x1="600" y1="300" x2="450" y2="480"/>
    <line x1="600" y1="300" x2="780" y2="500"/>
    <line x1="600" y1="300" x2="200" y2="300"/>
    <line x1="600" y1="300" x2="1000" y2="280"/>
    <line x1="350" y1="200" x2="200" y2="300"/>
    <line x1="850" y1="180" x2="1000" y2="280"/>
    <line x1="300" y1="420" x2="450" y2="480"/>
    <line x1="900" y1="400" x2="780" y2="500"/>
    <line x1="350" y1="200" x2="450" y2="480"/>
    <line x1="850" y1="180" x2="900" y2="400"/>
    <line x1="200" y1="300" x2="300" y2="420"/>
    <line x1="1000" y1="280" x2="900" y2="400"/>
  </g>

  <!-- Central node -->
  <circle cx="600" cy="300" r="24" fill="#6366f1" opacity="0.9"/>
  <circle cx="600" cy="300" r="16" fill="#818cf8"/>
  <circle cx="600" cy="300" r="8" fill="white"/>

  <!-- Outer nodes (AI platforms) -->
  <g>
    <circle cx="350" cy="200" r="14" fill="#06b6d4" opacity="0.8"/>
    <circle cx="350" cy="200" r="7" fill="white" opacity="0.6"/>

    <circle cx="850" cy="180" r="16" fill="#6366f1" opacity="0.8"/>
    <circle cx="850" cy="180" r="8" fill="white" opacity="0.6"/>

    <circle cx="300" cy="420" r="12" fill="#06b6d4" opacity="0.7"/>
    <circle cx="300" cy="420" r="6" fill="white" opacity="0.5"/>

    <circle cx="900" cy="400" r="15" fill="#6366f1" opacity="0.75"/>
    <circle cx="900" cy="400" r="7" fill="white" opacity="0.6"/>

    <circle cx="450" cy="480" r="11" fill="#06b6d4" opacity="0.7"/>
    <circle cx="450" cy="480" r="5" fill="white" opacity="0.5"/>

    <circle cx="780" cy="500" r="13" fill="#6366f1" opacity="0.7"/>
    <circle cx="780" cy="500" r="6" fill="white" opacity="0.5"/>

    <circle cx="200" cy="300" r="10" fill="#06b6d4" opacity="0.6"/>
    <circle cx="200" cy="300" r="5" fill="white" opacity="0.4"/>

    <circle cx="1000" cy="280" r="12" fill="#6366f1" opacity="0.65"/>
    <circle cx="1000" cy="280" r="6" fill="white" opacity="0.5"/>
  </g>

  <!-- Floating small particles -->
  <circle cx="500" cy="150" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="700" cy="130" r="2" fill="#6366f1" opacity="0.5"/>
  <circle cx="150" cy="450" r="2.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="1050" cy="450" r="3" fill="#6366f1" opacity="0.35"/>
  <circle cx="550" cy="550" r="2" fill="white" opacity="0.2"/>
  <circle cx="680" cy="100" r="2" fill="white" opacity="0.15"/>

  <!-- Title text -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="1">
    Generative Engine Optimization
  </text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" letter-spacing="2">
    OPTIMIZING FOR AI-POWERED DISCOVERY
  </text>
</svg>