<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#0c2a33"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#20b8cd"/>
      <stop offset="100%" stop-color="#1a96a5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#20b8cd" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#20b8cd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="350" rx="380" ry="260" fill="url(#glow)"/>

  <!-- Answer card -->
  <rect x="270" y="150" width="660" height="360" rx="16" fill="#0e1f26" stroke="#20b8cd" stroke-width="1" opacity="0.7"/>
  <rect x="270" y="150" width="660" height="44" rx="16" fill="#123039" opacity="0.8"/>
  <circle cx="298" cy="172" r="6" fill="#20b8cd" opacity="0.6"/>
  <text x="322" y="177" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#67e8f9" opacity="0.85">Perplexity answer</text>

  <!-- Answer text lines -->
  <rect x="300" y="222" width="560" height="12" rx="6" fill="#334155" opacity="0.8"/>
  <rect x="300" y="248" width="600" height="12" rx="6" fill="#334155" opacity="0.7"/>
  <rect x="300" y="274" width="420" height="12" rx="6" fill="#334155" opacity="0.6"/>

  <!-- Highlighted brand mention -->
  <rect x="300" y="306" width="180" height="26" rx="8" fill="url(#teal)" opacity="0.9"/>
  <text x="390" y="324" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#04222a">Your Brand</text>
  <rect x="492" y="310" width="380" height="12" rx="6" fill="#334155" opacity="0.7"/>

  <!-- Citations header -->
  <text x="300" y="378" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">SOURCES</text>
  <!-- Citation chips -->
  <rect x="300" y="392" width="120" height="30" rx="8" fill="#123039" stroke="#20b8cd" stroke-width="1" opacity="0.85"/>
  <text x="360" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#67e8f9">1. yoursite</text>
  <rect x="432" y="392" width="120" height="30" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.7"/>
  <text x="492" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">2. g2.com</text>
  <rect x="564" y="392" width="130" height="30" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
  <text x="629" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">3. reddit.com</text>
  <rect x="706" y="392" width="140" height="30" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="776" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">4. competitor</text>

  <!-- Tracking pulse row -->
  <circle cx="312" cy="466" r="5" fill="#20b8cd"/>
  <rect x="330" y="460" width="150" height="12" rx="6" fill="#20b8cd" opacity="0.4"/>
  <circle cx="512" cy="466" r="5" fill="#20b8cd" opacity="0.7"/>
  <rect x="530" y="460" width="150" height="12" rx="6" fill="#20b8cd" opacity="0.3"/>
  <circle cx="712" cy="466" r="5" fill="#20b8cd" opacity="0.5"/>
  <rect x="730" y="460" width="150" height="12" rx="6" fill="#20b8cd" opacity="0.2"/>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="0.5">
    Track Brand Mentions in Perplexity
  </text>
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">
    MONITOR MENTIONS AND CITATIONS ON EVERY RUN
  </text>
</svg>
