<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="fs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#231020"/>
    </linearGradient>
    <radialGradient id="fs-glow" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fs-arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#fs-bg)"/>
  <ellipse cx="600" cy="320" rx="430" ry="270" fill="url(#fs-glow)"/>

  <!-- Sentiment gauge: negative -> positive -->
  <g transform="translate(600,340)">
    <path d="M -220 0 A 220 220 0 0 1 220 0" fill="none" stroke="#1e293b" stroke-width="22" stroke-linecap="round"/>
    <path d="M -220 0 A 220 220 0 0 1 220 0" fill="none" stroke="url(#fs-arrow)" stroke-width="22" stroke-linecap="round" opacity="0.85"/>

    <!-- needle moving toward positive -->
    <g transform="rotate(38)">
      <line x1="0" y1="0" x2="0" y2="-190" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="14" fill="#f8fafc"/>
      <circle cx="0" cy="0" r="7" fill="#0f172a"/>
    </g>

    <!-- end labels -->
    <text x="-232" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#ef4444">-</text>
    <text x="232" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#10b981">+</text>
  </g>

  <text x="600" y="78" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="1">
    Fixing Negative Brand Sentiment in AI
  </text>
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#cbd5e1" opacity="0.9">
    Detect &#8594; diagnose &#8594; fix the source &#8594; re-measure
  </text>
  <text x="600" y="592" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">
    A PRACTICAL AI REPUTATION PLAYBOOK
  </text>
</svg>
