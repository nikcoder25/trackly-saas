<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#1a1640"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="350" rx="420" ry="250" fill="url(#glow)"/>

  <!-- Three comparison cards -->
  <g font-family="system-ui, sans-serif">
    <!-- Card 1 -->
    <rect x="200" y="210" width="240" height="260" rx="14" fill="#1e1b4b" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
    <text x="320" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">Peec AI</text>
    <line x1="230" y1="276" x2="410" y2="276" stroke="#334155"/>
    <rect x="232" y="300" width="176" height="10" rx="5" fill="#334155"/>
    <rect x="232" y="326" width="150" height="10" rx="5" fill="#334155"/>
    <rect x="232" y="352" width="164" height="10" rx="5" fill="#334155"/>
    <rect x="232" y="378" width="120" height="10" rx="5" fill="#334155"/>

    <!-- Card 2 -->
    <rect x="480" y="185" width="240" height="290" rx="14" fill="#141b3a" stroke="url(#acc)" stroke-width="2.5"/>
    <rect x="480" y="185" width="240" height="34" rx="14" fill="url(#acc)"/>
    <text x="600" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="1">WINNER</text>
    <text x="600" y="262" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">Livesov</text>
    <line x1="510" y1="282" x2="690" y2="282" stroke="#334155"/>
    <rect x="512" y="304" width="176" height="10" rx="5" fill="#6366f1" opacity="0.8"/>
    <rect x="512" y="330" width="176" height="10" rx="5" fill="#6366f1" opacity="0.7"/>
    <rect x="512" y="356" width="176" height="10" rx="5" fill="#06b6d4" opacity="0.7"/>
    <rect x="512" y="382" width="176" height="10" rx="5" fill="#06b6d4" opacity="0.6"/>
    <rect x="512" y="408" width="176" height="10" rx="5" fill="#6366f1" opacity="0.5"/>

    <!-- Card 3 -->
    <rect x="760" y="210" width="240" height="260" rx="14" fill="#1e1b4b" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
    <text x="880" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">Promptwatch</text>
    <line x1="790" y1="276" x2="970" y2="276" stroke="#334155"/>
    <rect x="792" y="300" width="176" height="10" rx="5" fill="#334155"/>
    <rect x="792" y="326" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="792" y="352" width="158" height="10" rx="5" fill="#334155"/>
    <rect x="792" y="378" width="128" height="10" rx="5" fill="#334155"/>
  </g>

  <text x="600" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="white">Peec AI vs Promptwatch vs Livesov</text>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">AI VISIBILITY TRACKERS COMPARED</text>
</svg>
