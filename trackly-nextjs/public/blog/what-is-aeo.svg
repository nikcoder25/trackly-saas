<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="aeo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="aeo-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aeo-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#aeo-bg)"/>
  <ellipse cx="600" cy="300" rx="420" ry="280" fill="url(#aeo-glow)"/>

  <!-- Central answer engine node -->
  <g transform="translate(600, 300)">
    <circle r="66" fill="#0f172a" stroke="url(#aeo-node)" stroke-width="3"/>
    <circle r="52" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="white">AEO</text>
  </g>

  <!-- Source nodes feeding the answer -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#cbd5e1">
    <!-- connectors -->
    <line x1="600" y1="300" x2="270" y2="170" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
    <line x1="600" y1="300" x2="250" y2="330" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
    <line x1="600" y1="300" x2="300" y2="470" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
    <line x1="600" y1="300" x2="930" y2="170" stroke="#06b6d4" stroke-width="1.5" opacity="0.35"/>
    <line x1="600" y1="300" x2="950" y2="330" stroke="#06b6d4" stroke-width="1.5" opacity="0.35"/>
    <line x1="600" y1="300" x2="900" y2="470" stroke="#06b6d4" stroke-width="1.5" opacity="0.35"/>

    <g transform="translate(270,170)"><circle r="34" fill="#111a33" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/><text x="0" y="5" text-anchor="middle">Reviews</text></g>
    <g transform="translate(250,330)"><circle r="34" fill="#111a33" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/><text x="0" y="5" text-anchor="middle">Docs</text></g>
    <g transform="translate(300,470)"><circle r="34" fill="#111a33" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/><text x="0" y="5" text-anchor="middle">FAQs</text></g>
    <g transform="translate(930,170)"><circle r="34" fill="#0c2233" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/><text x="0" y="5" text-anchor="middle">Roundups</text></g>
    <g transform="translate(950,330)"><circle r="34" fill="#0c2233" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/><text x="0" y="5" text-anchor="middle">Schema</text></g>
    <g transform="translate(900,470)"><circle r="34" fill="#0c2233" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/><text x="0" y="5" text-anchor="middle">Citations</text></g>
  </g>

  <text x="600" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="1">
    Answer Engine Optimization
  </text>
  <text x="600" y="588" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">
    GETTING CITED IN AI ANSWERS
  </text>
</svg>
