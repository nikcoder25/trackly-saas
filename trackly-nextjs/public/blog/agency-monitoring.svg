<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Overlapping dashboard cards -->
  <rect x="320" y="140" width="260" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.8"/>
  <rect x="330" y="150" width="240" height="8" rx="4" fill="#334155"/>
  <rect x="330" y="170" width="100" height="6" rx="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="550" y="175" r="4" fill="#10b981"/>
  <rect x="330" y="195" width="200" height="4" rx="2" fill="#334155"/>
  <rect x="330" y="210" width="160" height="4" rx="2" fill="#334155"/>
  <rect x="330" y="225" width="180" height="4" rx="2" fill="#334155"/>
  <rect x="330" y="260" width="70" height="24" rx="6" fill="#6366f1" opacity="0.3"/>
  <rect x="410" y="260" width="70" height="24" rx="6" fill="#10b981" opacity="0.3"/>
  <rect x="490" y="260" width="70" height="24" rx="6" fill="#06b6d4" opacity="0.3"/>
  <!-- Second card (overlapping) -->
  <rect x="500" y="180" width="260" height="180" rx="12" fill="#1e293b" stroke="url(#card1)" stroke-width="1.5"/>
  <rect x="510" y="190" width="240" height="8" rx="4" fill="#334155"/>
  <rect x="510" y="210" width="120" height="6" rx="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="720" cy="215" r="4" fill="#f59e0b"/>
  <rect x="510" y="235" width="200" height="4" rx="2" fill="#334155"/>
  <rect x="510" y="250" width="140" height="4" rx="2" fill="#334155"/>
  <rect x="510" y="265" width="170" height="4" rx="2" fill="#334155"/>
  <rect x="510" y="300" width="70" height="24" rx="6" fill="#8b5cf6" opacity="0.3"/>
  <rect x="590" y="300" width="70" height="24" rx="6" fill="#ef4444" opacity="0.3"/>
  <rect x="670" y="300" width="70" height="24" rx="6" fill="#10b981" opacity="0.3"/>
  <!-- Third card -->
  <rect x="680" y="220" width="260" height="180" rx="12" fill="#1e293b" stroke="url(#card2)" stroke-width="1.5"/>
  <rect x="690" y="230" width="240" height="8" rx="4" fill="#334155"/>
  <rect x="690" y="250" width="90" height="6" rx="3" fill="#06b6d4" opacity="0.6"/>
  <circle cx="900" cy="255" r="4" fill="#10b981"/>
  <rect x="690" y="275" width="200" height="4" rx="2" fill="#334155"/>
  <rect x="690" y="290" width="150" height="4" rx="2" fill="#334155"/>
  <rect x="690" y="305" width="180" height="4" rx="2" fill="#334155"/>
  <rect x="690" y="340" width="70" height="24" rx="6" fill="#06b6d4" opacity="0.3"/>
  <rect x="770" y="340" width="70" height="24" rx="6" fill="#6366f1" opacity="0.3"/>
  <!-- Connecting lines -->
  <line x1="580" y1="360" x2="630" y2="400" stroke="#6366f1" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="760" y1="400" x2="810" y2="420" stroke="#06b6d4" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <!-- Users icon -->
  <circle cx="600" cy="470" r="28" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="462" r="8" fill="#6366f1" opacity="0.4"/>
  <path d="M584 482 a16 12 0 0 1 32 0" fill="#6366f1" opacity="0.3"/>
  <!-- Title -->
  <text x="600" y="550" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#fff" letter-spacing="-1">AI Brand Monitoring for Agencies</text>
  <text x="600" y="580" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8">Multi-client dashboards &middot; Proof exports &middot; Revenue growth</text>
</svg>
