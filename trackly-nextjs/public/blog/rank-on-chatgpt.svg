<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#0d1f1a"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10a37f"/><stop offset="100%" stop-color="#0d8168"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#10a37f" stop-opacity="0.18"/><stop offset="100%" stop-color="#10a37f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="350" rx="400" ry="250" fill="url(#glow)"/>

  <!-- Chat window -->
  <rect x="290" y="150" width="620" height="360" rx="16" fill="#0d1f1a" stroke="#10a37f" stroke-width="1" opacity="0.75"/>
  <rect x="290" y="150" width="620" height="42" rx="16" fill="#123a30" opacity="0.8"/>
  <circle cx="316" cy="171" r="14" fill="url(#green)"/><text x="316" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#04140f">C</text>
  <text x="342" y="176" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6ee7b7">ChatGPT</text>

  <!-- User prompt bubble -->
  <rect x="520" y="212" width="360" height="40" rx="12" fill="#1f2937"/>
  <text x="540" y="237" font-family="system-ui, sans-serif" font-size="13" fill="#cbd5e1">Best tools for [your category]?</text>

  <!-- Answer -->
  <rect x="320" y="272" width="480" height="11" rx="5" fill="#334155" opacity="0.8"/>
  <rect x="320" y="296" width="520" height="11" rx="5" fill="#334155" opacity="0.7"/>
  <!-- cited brand -->
  <rect x="320" y="326" width="150" height="26" rx="8" fill="url(#green)"/>
  <text x="395" y="344" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#04140f">Your Brand</text>
  <text x="482" y="344" font-family="system-ui, sans-serif" font-size="13" fill="#6ee7b7">is cited first</text>
  <rect x="320" y="368" width="500" height="11" rx="5" fill="#334155" opacity="0.6"/>
  <rect x="320" y="392" width="440" height="11" rx="5" fill="#334155" opacity="0.5"/>

  <!-- rank up arrow -->
  <g transform="translate(830,300)">
    <circle cx="0" cy="0" r="34" fill="#123a30" stroke="#10a37f" stroke-width="2"/>
    <path d="M -12 8 L 0 -12 L 12 8" fill="none" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-12" x2="0" y2="10" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white">How to Rank on ChatGPT</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="2">THE 2026 PLAYBOOK FOR GETTING CITED</text>
</svg>
