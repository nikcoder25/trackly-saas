<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackly — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--text:#e8e8e8;--muted:#666;
  --green:#00ff88;--red:#ff4455;--amber:#f59e0b;--blue:#3b82f6;
  --purple:#9b72ff;--font:'Inter',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

/* Layout */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--bg2);}
.topbar-logo{font-size:20px;font-weight:800;letter-spacing:-1px;}
.topbar-logo span{color:var(--green);}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px;}
.topbar-email{color:var(--muted);font-family:var(--mono);font-size:11px;}
.container{max-width:1200px;margin:0 auto;padding:28px;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);padding:20px;}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-size:32px;font-weight:800;letter-spacing:-1px;}

/* Card */
.card{background:var(--bg2);border:1px solid var(--border);padding:24px;margin-bottom:20px;}
.card-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.finput{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--font);font-size:13px;outline:none;}
.finput:focus{border-color:var(--green);}
.finput-sm{padding:6px 10px;font-size:11px;font-family:var(--mono);}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);}
.tbl tr:hover td{background:var(--bg3);}
.badge{display:inline-block;font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:2px;font-weight:700;}
.badge-free{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}
.badge-pro{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3);}
.badge-agency{background:rgba(155,114,255,.1);color:var(--purple);border:1px solid rgba(155,114,255,.3);}
.badge-admin{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3);}
.badge-user{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}

/* Buttons */
.btn{border:none;font-family:var(--mono);font-size:10px;padding:6px 14px;cursor:pointer;letter-spacing:0.5px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-edit{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.btn-primary{background:var(--green);color:#000;font-weight:700;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 16px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-back:hover{border-color:var(--green);color:var(--green);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
.modal-body{padding:20px;}
.modal-body label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.modal-body .finput{width:100%;margin-bottom:14px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

/* Info box */
.info-box{padding:14px;background:var(--bg3);border:1px solid var(--border);margin-top:8px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;}
.info-label{color:var(--muted);font-size:10px;margin-bottom:2px;}
.info-value{font-family:var(--mono);font-size:11px;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;font-family:var(--mono);font-size:12px;border:1px solid var(--border);background:var(--bg2);z-index:200;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(0,255,136,.4);color:var(--green);}
.toast.err{border-color:rgba(255,68,85,.4);color:var(--red);}

/* Login screen */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);padding:40px;max-width:400px;width:100%;text-align:center;}
.login-box h2{margin-bottom:8px;font-size:20px;}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px;}
.login-box .finput{margin-bottom:12px;}

/* Not admin */
.not-admin{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
.not-admin-box{background:var(--bg2);border:1px solid var(--border);padding:40px;max-width:440px;width:100%;}

/* Responsive */
@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .toolbar{flex-direction:column;align-items:stretch;}
  .toolbar .finput{width:100%!important;}
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen" style="display:none;">
  <div class="login-box">
    <h2>Admin Panel</h2>
    <p>Login to manage your Trackly users.</p>
    <input class="finput" id="login-email" type="email" placeholder="Email address">
    <input class="finput" id="login-pass" type="password" placeholder="Password">
    <div style="margin-top:6px;">
      <button class="btn btn-primary" style="width:100%;padding:10px;" onclick="doLogin()">LOGIN</button>
    </div>
    <p id="login-error" style="color:var(--red);font-size:12px;margin-top:12px;display:none;"></p>
  </div>
</div>

<!-- Not Admin Screen -->
<div id="not-admin-screen" class="not-admin" style="display:none;">
  <div class="not-admin-box">
    <div style="font-size:36px;margin-bottom:12px;">&#9888;</div>
    <h2 style="margin-bottom:8px;">Not Admin</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px;">Your account does not have admin access.</p>
    <button class="btn btn-primary" id="become-admin-btn" style="padding:10px 24px;display:none;" onclick="becomeAdmin()">BECOME ADMIN</button>
    <p id="become-admin-msg" style="color:var(--muted);font-size:11px;margin-top:10px;display:none;">No admin exists yet — click above to claim admin role.</p>
    <div style="margin-top:16px;"><a href="/" class="btn-back">Back to Trackly</a></div>
  </div>
</div>

<!-- Main Admin Panel -->
<div id="admin-app" style="display:none;">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="topbar-logo">Trackly<span>.</span> Admin</div>
      <a href="/" class="btn-back" style="font-size:11px;padding:4px 12px;">&#8592; Back to App</a>
    </div>
    <div class="topbar-right">
      <span class="topbar-email" id="admin-email"></span>
      <button class="btn btn-ghost" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="stats" id="stats-row"></div>

    <!-- Users Card -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div class="card-title" style="margin:0;">All Users</div>
        <button class="btn btn-ghost" onclick="loadUsers()" style="font-size:9px;">&#8635; REFRESH</button>
      </div>
      <div class="toolbar">
        <input class="finput finput-sm" id="search-input" type="text" placeholder="Search name or email..." style="width:260px;" oninput="applyFilters()">
        <select class="finput finput-sm" id="filter-plan" style="width:120px;" onchange="applyFilters()">
          <option value="">All Plans</option>
          <option value="free">Free</option>
          <option value="pro">Pro</option>
          <option value="agency">Agency</option>
        </select>
        <select class="finput finput-sm" id="filter-role" style="width:120px;" onchange="applyFilters()">
          <option value="">All Roles</option>
          <option value="admin">Admin</option>
          <option value="user">User</option>
        </select>
        <div style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);" id="user-count"></div>
      </div>
      <div id="users-table"></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-head">
      <span id="modal-title">Edit User</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <label>Email</label>
      <input class="finput" id="edit-email" type="email">

      <label>Name</label>
      <input class="finput" id="edit-name" type="text">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label>Plan</label>
          <select class="finput" id="edit-plan" style="width:100%;">
            <option value="free">Free</option>
            <option value="pro">Pro</option>
            <option value="agency">Agency</option>
          </select>
        </div>
        <div>
          <label>Role</label>
          <select class="finput" id="edit-role" style="width:100%;">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="info-box">
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Account Info</div>
        <div class="info-grid">
          <div><div class="info-label">Joined</div><div class="info-value" id="edit-joined">—</div></div>
          <div><div class="info-label">Brands</div><div class="info-value" id="edit-brands">—</div></div>
          <div><div class="info-label">API Keys</div><div class="info-value" id="edit-keys">—</div></div>
          <div><div class="info-label">Plan Limits</div><div class="info-value" id="edit-limits">—</div></div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">CANCEL</button>
        <button class="btn btn-primary" onclick="saveUser()">SAVE CHANGES</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast-el"></div>

<script>
const API = '';
let token = localStorage.getItem('trackly_token') || '';
let allUsers = [];
let currentAdmin = null;

// ─── Helpers ──────────────────────────
function $(id){ return document.getElementById(id); }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function toast(msg, type){
  const t = $('toast-el');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'');
  setTimeout(()=>{ t.className='toast'; }, 3000);
}

async function api(method, path, data){
  const opts = { method, headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token } };
  if(data) opts.body = JSON.stringify(data);
  const res = await fetch(API+path, opts);
  const json = await res.json();
  if(!res.ok) throw new Error(json.error||'Request failed');
  return json;
}

// ─── Auth ──────────────────────────
async function doLogin(){
  const email = $('login-email').value.trim();
  const pass = $('login-pass').value;
  if(!email||!pass){ $('login-error').textContent='Enter email and password'; $('login-error').style.display='block'; return; }
  try{
    const data = await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})}).then(r=>r.json());
    if(data.error) throw new Error(data.error);
    token = data.token;
    localStorage.setItem('trackly_token',token);
    init();
  }catch(e){
    $('login-error').textContent=e.message; $('login-error').style.display='block';
  }
}

function doLogout(){
  token='';
  localStorage.removeItem('trackly_token');
  showScreen('login');
}

// ─── Init ──────────────────────────
async function init(){
  if(!token){ showScreen('login'); return; }
  try{
    const data = await api('GET','/api/auth/me');
    currentAdmin = data.user;
    if(currentAdmin.role==='admin'){
      $('admin-email').textContent = currentAdmin.email;
      showScreen('admin');
      loadUsers();
    } else {
      // Check if any admin exists
      try{
        const check = await api('GET','/api/admin/check-admin');
        if(!check.hasAdmin){
          $('become-admin-btn').style.display='inline-block';
          $('become-admin-msg').style.display='block';
        }
      }catch(e){}
      showScreen('not-admin');
    }
  }catch(e){
    token='';
    localStorage.removeItem('trackly_token');
    showScreen('login');
  }
}

function showScreen(name){
  $('login-screen').style.display = name==='login'?'flex':'none';
  $('not-admin-screen').style.display = name==='not-admin'?'flex':'none';
  $('admin-app').style.display = name==='admin'?'block':'none';
}

async function becomeAdmin(){
  try{
    const data = await api('POST','/api/admin/make-first-admin');
    if(data.success){
      toast('You are now admin!','ok');
      currentAdmin.role='admin';
      $('admin-email').textContent=currentAdmin.email;
      showScreen('admin');
      loadUsers();
    }
  }catch(e){ toast(e.message,'err'); }
}

// ─── Users ──────────────────────────
async function loadUsers(){
  $('users-table').innerHTML='<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px;">Loading users...</div>';
  try{
    const data = await api('GET','/api/admin/users');
    allUsers = data.users||[];
    renderStats();
    applyFilters();
  }catch(e){
    $('users-table').innerHTML='<div style="text-align:center;padding:40px;color:var(--red);font-size:13px;">Failed to load: '+esc(e.message)+'</div>';
  }
}

function renderStats(){
  const total=allUsers.length;
  const free=allUsers.filter(u=>u.plan==='free').length;
  const pro=allUsers.filter(u=>u.plan==='pro').length;
  const agency=allUsers.filter(u=>u.plan==='agency').length;
  const admins=allUsers.filter(u=>u.role==='admin').length;
  const stats=[
    {label:'Total Users',value:total,color:'var(--text)'},
    {label:'Free Plan',value:free,color:'var(--muted)'},
    {label:'Pro Plan',value:pro,color:'var(--green)'},
    {label:'Agency Plan',value:agency,color:'var(--purple)'}
  ];
  $('stats-row').innerHTML=stats.map(s=>`
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" style="color:${s.color};">${s.value}</div>
    </div>
  `).join('');
}

function applyFilters(){
  const q=($('search-input').value||'').toLowerCase().trim();
  const pf=$('filter-plan').value;
  const rf=$('filter-role').value;
  let list=allUsers;
  if(q) list=list.filter(u=>u.email.toLowerCase().includes(q)||(u.name||'').toLowerCase().includes(q));
  if(pf) list=list.filter(u=>u.plan===pf);
  if(rf) list=list.filter(u=>rf==='admin'?u.role==='admin':u.role!=='admin');
  $('user-count').textContent=list.length+' of '+allUsers.length+' users';
  renderTable(list);
}

function renderTable(users){
  if(!users.length){
    $('users-table').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">No users found.</div>';
    return;
  }
  let html=`<table class="tbl"><thead><tr>
    <th>User</th><th>Plan</th><th>Role</th><th>Brands</th><th>API Keys</th><th>Joined</th><th style="text-align:right;">Actions</th>
  </tr></thead><tbody>`;
  users.forEach(u=>{
    const joined=u.createdAt?new Date(u.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    const keyCount=(u.hasKeys||[]).length;
    const isMe=currentAdmin&&u.id===currentAdmin.id;
    html+=`<tr>
      <td>
        <div style="font-weight:600;font-size:13px;">${esc(u.name||'—')}${isMe?' <span style="font-family:var(--mono);font-size:9px;color:var(--green);border:1px solid rgba(0,255,136,.3);padding:1px 5px;border-radius:2px;margin-left:4px;">YOU</span>':''}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;">${esc(u.email)}</div>
      </td>
      <td><span class="badge badge-${u.plan}">${(u.plan||'free').toUpperCase()}</span></td>
      <td><span class="badge badge-${u.role==='admin'?'admin':'user'}">${u.role||'user'}</span></td>
      <td style="font-family:var(--mono);font-size:12px;">${u.brandCount!==undefined?u.brandCount:'—'}</td>
      <td style="font-family:var(--mono);font-size:11px;color:${keyCount?'var(--green)':'var(--muted)'};">${keyCount?keyCount+' set':'None'}</td>
      <td style="font-family:var(--mono);font-size:10px;color:var(--muted);">${joined}</td>
      <td style="text-align:right;">
        <button class="btn btn-edit" onclick="openEdit('${u.id}')">EDIT</button>
      </td>
    </tr>`;
  });
  html+='</tbody></table>';
  $('users-table').innerHTML=html;
}

// ─── Edit Modal ──────────────────────────
function openEdit(userId){
  const u=allUsers.find(x=>x.id===userId);
  if(!u)return;
  $('edit-id').value=u.id;
  $('edit-email').value=u.email||'';
  $('edit-name').value=u.name||'';
  $('edit-plan').value=u.plan||'free';
  $('edit-role').value=u.role||'user';
  $('modal-title').textContent='Edit — '+(u.name||u.email);
  const joined=u.createdAt?new Date(u.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
  $('edit-joined').textContent=joined;
  $('edit-brands').textContent=(u.brandCount!==undefined?u.brandCount:'—')+' / '+(u.limits?.brands||'?')+' allowed';
  $('edit-keys').textContent=(u.hasKeys||[]).length?(u.hasKeys||[]).join(', '):'None';
  $('edit-limits').textContent=(u.limits?.queries||'?')+' queries, '+(u.limits?.runsPerDay||'?')+' runs/day';
  $('edit-role').disabled=(currentAdmin&&u.id===currentAdmin.id);
  $('edit-modal').classList.add('open');
}

function closeModal(){
  $('edit-modal').classList.remove('open');
}

async function saveUser(){
  const userId=$('edit-id').value;
  if(!userId)return;
  const u=allUsers.find(x=>x.id===userId);
  if(!u)return;
  const payload={};
  const newEmail=$('edit-email').value.trim();
  const newName=$('edit-name').value.trim();
  const newPlan=$('edit-plan').value;
  const newRole=$('edit-role').value;
  if(newEmail!==u.email) payload.email=newEmail;
  if(newName!==(u.name||'')) payload.name=newName;
  if(newPlan!==u.plan) payload.plan=newPlan;
  if(newRole!==(u.role||'user')) payload.role=newRole;
  if(!Object.keys(payload).length){ closeModal(); toast('No changes','ok'); return; }
  try{
    const data=await api('PUT','/api/admin/users/'+userId,payload);
    const idx=allUsers.findIndex(x=>x.id===userId);
    if(idx>=0) Object.assign(allUsers[idx],data.user);
    closeModal();
    renderStats();
    applyFilters();
    toast('User updated!','ok');
  }catch(e){ toast(e.message,'err'); }
}

// ─── Keyboard ──────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
});

// ─── Start ──────────────────────────
init();
</script>
</body>
</html>
