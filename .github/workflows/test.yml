# CI test workflow.
#
# Provisions a Postgres 16 service so tests that need a real database
# (e.g. the Fix 5 race test covering the partial unique index on
# active_runs(brand_id) WHERE status='running') can run in CI instead
# of being skipped for lack of DATABASE_URL.
#
# Schema is created lazily by the app via initTable() in
# src/app/api/brands/[id]/run/route.ts, so no separate migrate step is
# required — the first DB-touching test will create the table and
# index on demand.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trackly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trackly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/trackly_test

    defaults:
      run:
        working-directory: trackly-nextjs

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trackly-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  prod-build:
    # Mirrors the DigitalOcean App Platform build environment, which sets
    # NODE_ENV=production so `npm ci` SKIPS devDependencies, then runs
    # `next build`. The "Typecheck and tests" job above installs the full
    # dependency tree, so a type-only package left in devDependencies (e.g.
    # @types/pdfkit) passes there but breaks the real deploy with
    # "Could not find a declaration file for module ...". This job catches
    # that class of "green CI, failed deploy" bug before merge.
    name: Production build (DO parity)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: trackly-nextjs

    env:
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trackly-nextjs/package-lock.json

      - name: Install production dependencies (devDeps omitted, like DO)
        run: npm ci --omit=dev

      - name: Production build
        run: npm run build

