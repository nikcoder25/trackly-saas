# Daily cron for /api/cron (per-brand scheduled runs).
#
# Was hourly until the cost-reduction review (June 2026): with every plan's
# minScheduleHours >= 24 the hourly tick was firing 23 times a day only to
# log "interval_not_elapsed" for every brand. The hosted web_search tool
# (~$25/1k calls on gpt-4o-search-preview) dominated OpenAI spend and was
# being driven by the search-enabled retries on each of those wasted ticks.
# Daily cadence aligns with the actual per-brand schedule floor and pairs
# with the 02:30 UTC daily_floor in cron.yml as a second-chance window.
#
# Filename retained as cron-hourly.yml so existing GitHub Actions URLs,
# branch protection checks, and required-status entries continue to resolve.
#
# Time chosen (14:30 UTC) is ~12h offset from daily_floor (02:30 UTC) so
# a brand that missed one window still runs at least once per calendar day.
# Stale-run reaping is NOT on this workflow — it has its own dedicated
# 5-minute cron in cron-reap-stale-runs.yml and is unaffected.
#
# Required repository secrets: CRON_SECRET (matches the env var on
# DigitalOcean).

name: Daily tracking cron

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:

jobs:
  hourly:
    name: Daily tracking cron
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron"
