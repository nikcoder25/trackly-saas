# Scheduled cron jobs for livesov.com.
#
# DigitalOcean App Platform does not read vercel.json, so we need an external
# scheduler to hit /api/cron* routes. GitHub Actions is the cheapest option
# (free, already wired to this repo).
#
# Note: the per-brand scheduling tick lives in
# .github/workflows/cron-hourly.yml (kept under its original filename so
# existing required-status-check entries continue to resolve). Despite the
# name it now runs once daily at 14:30 UTC — see that file's header for
# the cost-reduction rationale.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   CRON_SECRET - same value as the CRON_SECRET env var on DigitalOcean
#
# Schedules are in UTC. Adjust if you want a different local time.

name: Scheduled cron

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "30 2 * * *"
    - cron: "0 8 * * 1"
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - reconcile
          - weekly
          - monthly

jobs:
  daily_floor:
    # Once-per-day safety net. Calls /api/cron?mode=daily_floor which takes
    # a separate Redis lock and bypasses the per-brand interval gate, so any
    # brand that drifted past its 24h slot (missed scheduled tick, clock
    # drift, extended lock contention) still runs at least once every 24h.
    # 02:30 UTC is ~12h offset from the 14:30 UTC scheduled tick in
    # cron-hourly.yml so the two together provide two attempts per calendar
    # day with a wide window between them.
    name: Daily floor cron
    if: github.event.schedule == '30 2 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Call /api/cron?mode=daily_floor
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 840 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron?mode=daily_floor"

  reconcile:
    # Payment reconciliation. Catches Dodo subscription changes that we
    # missed due to dropped webhooks (cancellations, upgrades, deletions).
    # Runs every 15 minutes so plan state can't drift for long.
    name: Reconcile payments cron
    if: github.event.schedule == '*/15 * * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'reconcile')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/reconcile-payments
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron/reconcile-payments"

  weekly:
    name: Weekly reports cron
    if: github.event.schedule == '0 8 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.job == 'weekly')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/reports?frequency=weekly
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron/reports?frequency=weekly"

  monthly:
    name: Monthly reports cron
    if: github.event.schedule == '0 8 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'monthly')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/reports?frequency=monthly
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron/reports?frequency=monthly"
