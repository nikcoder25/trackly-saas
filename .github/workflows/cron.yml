# Scheduled cron jobs for livesov.com.
#
# DigitalOcean App Platform does not read vercel.json, so we need an external
# scheduler to hit /api/cron* routes. GitHub Actions is the cheapest option
# (free, already wired to this repo).
#
# Note: the hourly tick (0 * * * *) lives in .github/workflows/cron-hourly.yml
# in its own workflow file to avoid GitHub Actions schedule-collision when
# two cron strings in the same workflow fire at the same minute. See that
# file's header comment for details.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   CRON_SECRET - same value as the CRON_SECRET env var on DigitalOcean
#
# Schedules are in UTC. Adjust if you want a different local time.

name: Scheduled cron

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "15 2 * * *"
    - cron: "30 2 * * *"
    - cron: "0 8 * * 1"
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - reconcile
          - trial_ended_emails
          - weekly
          - monthly

jobs:
  daily_floor:
    # Once-per-day safety net. Calls /api/cron?mode=daily_floor which takes
    # a separate Redis lock and bypasses the per-brand interval gate, so any
    # brand that drifted past its 24h slot (missed hourly tick, clock drift,
    # extended lock contention) still runs at least once every 24h. 02:30
    # UTC is deliberately off-cycle from the 0 * * * * hourly to avoid
    # racing the lock at the top of the hour.
    name: Daily floor cron
    if: github.event.schedule == '30 2 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Call /api/cron?mode=daily_floor
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 840 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron?mode=daily_floor"

  reconcile:
    # Payment reconciliation. Catches Dodo subscription changes that we
    # missed due to dropped webhooks (cancellations, upgrades, deletions).
    # Runs every 15 minutes so plan state can't drift for long.
    name: Reconcile payments cron
    if: github.event.schedule == '*/15 * * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'reconcile')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/reconcile-payments
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron/reconcile-payments"

  trial_ended_emails:
    # Once-per-day transactional email to users whose trial just expired.
    # Idempotent at the row level (users.trial_end_email_sent_at) and
    # cluster level (acquireCronLock 'trial_ended_emails'). 02:15 UTC is
    # 15 minutes before /api/cron?mode=daily_floor (02:30) so the two
    # daily jobs don't race on the same scheduler lock.
    name: Trial-ended emails cron
    if: github.event.schedule == '15 2 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'trial_ended_emails')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/trial-ended-emails
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron/trial-ended-emails"

  weekly:
    name: Weekly reports cron
    if: github.event.schedule == '0 8 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.job == 'weekly')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/reports?frequency=weekly
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron/reports?frequency=weekly"

  monthly:
    name: Monthly reports cron
    if: github.event.schedule == '0 8 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'monthly')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/reports?frequency=monthly
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --show-error --silent \
            --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livesov.com/api/cron/reports?frequency=monthly"
